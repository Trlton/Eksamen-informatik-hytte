<!DOCTYPE html>
<html lang="da">
<head>

  <style>
 
    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4rem;
    }

    h1 {
      font-size: 4rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #111;
      margin-top:10rem;
    }

    main {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 500px;
      height: 260px;
      background: #e6f2ee;
      border: 2px solid #123;
      border-radius: 8px;
      text-decoration: none;
      color: #111;
      font-size: 3rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn:hover {
      background: #96b3a8;
      border-color: #111;
      color: #fff;
    }
  </style>
