<!DOCTYPE html>
<html lang="da">
<head>
  <title>Betaling</title>
  <style>
    body { font-family: sans-serif; }
    input { display: block ; padding: 0.5rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; }
  </style>
</head>
<body>

  <a href="proviantKøb.html"> Tilbage</a>
  <h1>Betaling</h1>
  <p id="beløb">0 DKK</p>
  <h2>Personlige oplysninger<h2>
  <input type="text"  id="navn"   placeholder="For- og efternavn" />
  <input type="text"  id="email"  placeholder="Email" />

  <p> Kort oplysninger <p>
  <input type="text"  id="kortNr"  placeholder="Kort nummer" />
  <input type="text"  id="kortUdløb"  placeholder="Udløbsdato MM/ÅÅ" />
  <input type="text"  id="kortKode"  placeholder="Sikkerhedskode" />



  <button onclick="gem()">Bekræft betaling (no function)</button>




  <script>
    const total = localStorage.getItem("totalSum");
    document.getElementById("beløb").textContent = total + " DKK";
  </script>

</body>
</html>
